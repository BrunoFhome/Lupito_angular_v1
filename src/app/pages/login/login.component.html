<div class="page-container">

  <!-- Overlay de carregamento (Lupito caminhando) -->
  <app-walking-lupito-loader *ngIf="loading" message="Entrando…"></app-walking-lupito-loader>

  <!-- Formulário -->
  <div class="form-card">
    <a routerLink="/" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </a>
    <img src="assets/images/logo_nova.png" alt="Lupito" class="form-logo" />
    <h1>Login</h1>
    <p class="subtitle">Bem-vindo de volta! Entre na sua conta.</p>

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">

      <div class="form-group">
        <label for="email">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="seu@email.com"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Senha</label>
        <div class="password-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            [(ngModel)]="password"
            name="password"
            placeholder="Sua senha"
            required
          />
          <button type="button" class="btn-toggle-password" (click)="showPassword = !showPassword"
                  [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <!-- E-mail não verificado -->
      <div class="verify-warning" *ngIf="emailNotVerified">
        <p>Seu e-mail ainda não foi verificado. Verifique sua caixa de entrada ou reenvie o link.</p>
        <ng-container *ngIf="resendState !== 'sent'">
          <button type="button" class="btn-resend"
            (click)="onResendVerification()"
            [disabled]="resendState === 'loading'">
            {{ resendState === 'loading' ? 'Enviando...' : 'Reenviar e-mail de verificação' }}
          </button>
          <p class="resend-error" *ngIf="resendState === 'error'">{{ resendError }}</p>
        </ng-container>
        <p class="resend-sent" *ngIf="resendState === 'sent'">Link reenviado! Verifique sua caixa de entrada.</p>
      </div>

      <div class="forgot-link">
        <a routerLink="/forgot-password">Esqueci minha senha</a>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? 'Entrando…' : 'Entrar' }}
      </button>

    </form>

    <p class="form-footer">
      Não tem uma conta? <a routerLink="/register">Cadastre-se</a>
    </p>
  </div>

  <!-- Imagem com background circular -->
  <div class="image-wrapper">
    <p class="welcome-text">BEM-VINDO!</p>
    <div class="image-circle">
      <img src="assets/images/bemvindo.png" alt="Bem-vindo ao Lupito" class="welcome-img" />
    </div>
  </div>

</div>
