<div class="edit-container">
  <a routerLink="/preferences" class="btn-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Voltar
  </a>

  <h1 class="edit-title">Editar perfil</h1>
  <p class="edit-subtitle">Atualize seus dados de conta.</p>

  <app-loading-banner
    *ngIf="loading"
    title="Carregando seus dados…"
    subtitle="Buscando as informações da sua conta"></app-loading-banner>

  <form class="edit-form" *ngIf="!loading" (ngSubmit)="save()">
    <div class="form-group">
      <label for="name">Nome</label>
      <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Seu nome" autocomplete="name" />
      <span class="field-error" *ngIf="nameError">{{ nameError }}</span>
    </div>

    <div class="form-group">
      <label for="email">E-mail</label>
      <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="voce@email.com" autocomplete="email" />
      <span class="field-error" *ngIf="emailError">{{ emailError }}</span>
    </div>

    <div class="form-divider">
      <span>Alterar senha</span>
    </div>
    <p class="hint">Deixe em branco para manter a senha atual.</p>

    <div class="form-group">
      <label for="password">Nova senha</label>
      <input id="password" type="password" [(ngModel)]="password" name="password" placeholder="••••••••" autocomplete="new-password" />
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirmar nova senha</label>
      <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="••••••••" autocomplete="new-password" />
      <span class="field-error" *ngIf="passwordError">{{ passwordError }}</span>
    </div>

    <button type="submit" class="btn-save" [disabled]="saving">
      {{ saving ? 'Salvando...' : 'Salvar alterações' }}
    </button>
  </form>
</div>
