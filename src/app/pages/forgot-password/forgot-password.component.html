<div class="page-container">
  <div class="form-card">

    <!-- Confirmação enviada -->
    <div *ngIf="submitted" class="success-state">
      <div class="success-icon">✉️</div>
      <h2>Email enviado!</h2>
      <p>Se o email <strong>{{ email }}</strong> estiver cadastrado, você receberá um link para redefinir sua senha em breve.</p>
      <a routerLink="/login" class="btn-back">Voltar ao login</a>
    </div>

    <!-- Formulário -->
    <ng-container *ngIf="!submitted">
      <h1>Recuperar senha</h1>
      <p class="subtitle">Informe seu email e enviaremos um link para redefinir sua senha.</p>

      <form (ngSubmit)="onSubmit()" #form="ngForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            required
            email
          />
        </div>

        <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button type="submit" class="btn-primary" [disabled]="loading || !email">
          {{ loading ? 'Enviando...' : 'Enviar link de recuperação' }}
        </button>
      </form>

      <p class="form-footer">
        Lembrou a senha? <a routerLink="/login">Fazer login</a>
      </p>
    </ng-container>

  </div>
</div>
