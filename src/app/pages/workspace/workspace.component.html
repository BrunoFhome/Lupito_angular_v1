<div class="workspace-layout">
  <!-- Top Navigation Bar -->
  <header class="workspace-header">
    <div class="left-section">
      <button class="back-btn" (click)="goBack()">
        <svg viewBox="0 0 24 24" fill="none" class="w-6 h-6">
          <path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar para o Kanban
      </button>
      <div class="task-info" *ngIf="task">
        <h2>{{ task.title }}</h2>
        <span class="badge">{{ task.priority }}</span>
      </div>
    </div>
    
    <div class="actions">
      <button class="run-btn" (click)="runCode()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
        Executar
      </button>
      <button class="submit-btn" (click)="submitProject()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>
        Concluir Tarefa
      </button>
    </div>
  </header>

  <!-- Main Content Area -->
  <div class="workspace-main">
    
    <!-- Left Sidebar: Instructions -->
    <aside class="instructions-panel">
      <h3>Instruções do Desafio</h3>
      <div *ngIf="task" class="task-details">
        <p class="desc">{{ task.description }}</p>
        <div class="requirements">
          <h4>Requisitos:</h4>
          <ul>
            <li>Implementar a lógica necessária conforme a descrição.</li>
            <li>Certifique-se de que não haja erros de sintaxe.</li>
            <li>Teste seu código clicando em "Executar".</li>
          </ul>
        </div>
      </div>
      <div *ngIf="!task" class="error-msg">
        Nenhuma tarefa encontrada.
      </div>
    </aside>

    <!-- Right Sidebar: Editor -->
    <main class="editor-container">
      <ngx-monaco-editor 
        class="monaco-editor-comp" 
        [options]="editorOptions" 
        [(ngModel)]="code">
      </ngx-monaco-editor>
    </main>

  </div>
</div>
