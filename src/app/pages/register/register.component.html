<div class="page-container">

  <!-- Formulário -->
  <div class="form-card">

    <!-- Sucesso: aguardando verificação de e-mail -->
    <div *ngIf="registrationSuccess" class="success-state">
      <div class="success-icon">&#10003;</div>
      <h2>Conta criada!</h2>
      <p>Enviamos um e-mail de verificação para <strong>{{ email }}</strong>.<br/>
         Clique no link para ativar sua conta.</p>
      <a routerLink="/login" class="btn-primary">Ir para o login</a>
    </div>

    <ng-container *ngIf="!registrationSuccess">
    <a routerLink="/" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </a>
    <img src="assets/images/logo_lupitoo.png" alt="Lupito" class="form-logo" />
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os dados abaixo para começar.</p>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">

      <div class="form-group">
        <label for="name">Nome completo <span class="required">*</span></label>
        <input id="name" type="text" [(ngModel)]="name" name="name"
          placeholder="Seu nome completo" required />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input id="email" type="email" [(ngModel)]="email" name="email"
          placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Senha <span class="required">*</span></label>
        <input id="password" type="password" [(ngModel)]="password" name="password"
          placeholder="Mínimo 6 caracteres" required />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar senha <span class="required">*</span></label>
        <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword"
          name="confirmPassword" placeholder="Repita a senha" required />
      </div>

      <!-- Localização (opcional) -->
      <div class="location-section">
        <p class="section-label">Localização <span class="optional">(opcional)</span></p>
        <div class="form-row">
          <div class="form-group">
            <label for="state">Estado</label>
            <select id="state" [(ngModel)]="state" name="state">
              <option value="">Selecione</option>
              <option *ngFor="let s of brazilianStates" [value]="s.sigla">
                {{ s.sigla }} — {{ s.nome }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label for="city">Cidade</label>
            <input id="city" type="text" [(ngModel)]="city" name="city"
              placeholder="Sua cidade" />
          </div>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary">Criar conta</button>

    </form>

    <p class="form-footer">
      Já tem uma conta? <a routerLink="/login">Fazer login</a>
    </p>
    </ng-container>
  </div>

  <!-- Imagem com background circular -->
  <div class="image-wrapper">
    <p class="welcome-text">BEM-VINDO!</p>
    <div class="image-circle">
      <img src="assets/images/bemvindo.png" alt="Bem-vindo ao Lupito" class="welcome-img" />
    </div>
  </div>

</div>
