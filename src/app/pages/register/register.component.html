<div class="page-container">

  <!-- Formulário -->
  <div class="form-card">

    <!-- Sucesso: aguardando verificação de e-mail -->
    <div *ngIf="registrationSuccess" class="success-state">
      <div class="success-icon">&#10003;</div>
      <h2>Conta criada!</h2>
      <p>Enviamos um e-mail de verificação para <strong>{{ email }}</strong>.<br/>
         Clique no link para ativar sua conta.</p>
      <a routerLink="/login" class="btn-primary">Ir para o login</a>
    </div>

    <ng-container *ngIf="!registrationSuccess">
    <a routerLink="/" class="btn-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
      Voltar
    </a>
    <img src="assets/images/logo_nova.png" alt="Lupito" class="form-logo" />
    <h1>Criar conta</h1>
    <p class="subtitle">Preencha os dados abaixo para começar.</p>

    <form (ngSubmit)="onRegister()" #registerForm="ngForm">

      <div class="form-group">
        <label for="name">Nome completo <span class="required">*</span></label>
        <input id="name" type="text" [(ngModel)]="name" name="name"
          placeholder="Seu nome completo" required />
      </div>

      <div class="form-group">
        <label for="email">Email <span class="required">*</span></label>
        <input id="email" type="email" [(ngModel)]="email" name="email"
          placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="password">Senha <span class="required">*</span></label>
        <div class="password-wrapper">
          <input id="password" [type]="showPassword ? 'text' : 'password'" [(ngModel)]="password"
            name="password" placeholder="Mínimo 6 caracteres" required />
          <button type="button" class="btn-toggle-password" (click)="showPassword = !showPassword"
                  [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar" *ngIf="password.length > 0">
          <div class="strength-segments">
            <div class="strength-seg" *ngFor="let i of [1,2,3,4]"
                 [style.background]="strengthFilled >= i ? strengthColor : '#e2e8f0'"
                 [style.transition]="'background 0.3s'"></div>
          </div>
          <span class="strength-label" [style.color]="strengthColor">{{ strengthLabel }}</span>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar senha <span class="required">*</span></label>
        <div class="password-wrapper">
          <input id="confirmPassword" [type]="showConfirmPassword ? 'text' : 'password'"
            [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Repita a senha" required />
          <button type="button" class="btn-toggle-password" (click)="showConfirmPassword = !showConfirmPassword"
                  [attr.aria-label]="showConfirmPassword ? 'Ocultar senha' : 'Mostrar senha'">
            <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Localização (opcional) -->
      <div class="location-section">
        <p class="section-label">Localização <span class="optional">(opcional)</span></p>
        <div class="form-row">
          <div class="form-group">
            <label for="state">Estado</label>
            <select id="state" [(ngModel)]="state" name="state">
              <option value="">Selecione</option>
              <option *ngFor="let s of brazilianStates" [value]="s.sigla">
                {{ s.sigla }} — {{ s.nome }}
              </option>
            </select>
          </div>
          <div class="form-group">
            <label for="city">Cidade</label>
            <input id="city" type="text" [(ngModel)]="city" name="city"
              placeholder="Sua cidade" />
          </div>
        </div>
      </div>

      <div class="error-message" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary">Criar conta</button>

    </form>

    <p class="form-footer">
      Já tem uma conta? <a routerLink="/login">Fazer login</a>
    </p>
    </ng-container>
  </div>

  <!-- Imagem com background circular -->
  <div class="image-wrapper">
    <p class="welcome-text">BEM-VINDO!</p>
    <div class="image-circle">
      <img src="assets/images/bemvindo.png" alt="Bem-vindo ao Lupito" class="welcome-img" />
    </div>
  </div>

</div>
