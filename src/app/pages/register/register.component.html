<div class="page-container">
    <div class="form-card">
        <h1>Register</h1>
        <p class="subtitle">Create a new account to get started.</p>

        <form (ngSubmit)="onRegister()" #registerForm="ngForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input id="name" type="text" [(ngModel)]="name" name="name" placeholder="Enter your full name"
                    required />
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input id="email" type="email" [(ngModel)]="email" name="email" placeholder="Enter your email"
                    required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" [(ngModel)]="password" name="password"
                    placeholder="At least 6 characters" required />
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input id="confirmPassword" type="password" [(ngModel)]="confirmPassword" name="confirmPassword"
                    placeholder="Repeat your password" required />
            </div>

            <div class="error-message" *ngIf="errorMessage">
                {{ errorMessage }}
            </div>

            <button type="submit" class="btn-primary">Create Account</button>

        </form>

        <p class="form-footer">
            Already have an account? <a routerLink="/login">Login here</a>
        </p>
    </div>
</div>
