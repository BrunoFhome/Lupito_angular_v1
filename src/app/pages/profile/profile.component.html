<div class="page-container">
    <div style="color: red; padding: 20px;" *ngIf="errorMessage">
        Erro ao carregar perfil: {{ errorMessage }}
    </div>
    <div class="profile-card" *ngIf="user">

        <div class="profile-header">
            <div class="avatar">{{ user.name ? user.name.charAt(0).toUpperCase() : 'U' }}</div>
            <div class="profile-title">
                <h1>{{ user.name }}</h1>
                <span class="role-badge" *ngIf="user.role">{{ user.role }}</span>
            </div>
        </div>

        <hr />

        <div class="profile-info">
            <div class="info-row" *ngIf="user.username">
                <span class="info-label">Username</span>
                <span class="info-value">&#64;{{ user.username }}</span>
            </div>
            
            <div class="info-row">
                <span class="info-label">Email</span>
                <span class="info-value">{{ user.email }}</span>
            </div>
            
            <div class="info-row" *ngIf="user.joinDate">
                <span class="info-label">Member since</span>
                <span class="info-value">{{ user.joinDate | date:'mediumDate' }}</span>
            </div>
            
            <div class="bio-section">
                <div class="bio-header" style="display:flex; justify-content: space-between; align-items: center;">
                    <span class="info-label">Bio</span>
                    <button class="btn-edit" (click)="toggleEditBio()" *ngIf="!isEditingBio">Edit</button>
                    <button class="btn-save" (click)="saveBio()" *ngIf="isEditingBio">Save</button>
                </div>
                <div *ngIf="isEditingBio">
                    <textarea [(ngModel)]="user.bio" rows="4" style="width: 100%; margin-top: 10px;" placeholder="Tell us about yourself..."></textarea>
                </div>
                <div *ngIf="!isEditingBio">
                    <p class="bio-text">{{ user.bio || 'No bio provided yet.' }}</p>
                </div>
            </div>
        </div>

        <button class="btn-logout" (click)="onLogout()">Logout</button>

   </div>
</div>
