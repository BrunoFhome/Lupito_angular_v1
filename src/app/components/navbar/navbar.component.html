<nav class="sidebar">
  <div class="logo-container">
    <img src="assets/images/logo_nova.png" alt="Lupito" class="logo-img" />
  </div>

  <ul class="nav-links">
    <li>
      <a routerLink="/dashboard" routerLinkActive="active">
        <span class="nav-icon nav-icon-img">
          <img src="assets/images/icons/1.png" alt="" />
        </span>
        Início
      </a>
    </li>
    <li>
      <a routerLink="/aprendizado" routerLinkActive="active">
        <span class="nav-icon nav-icon-img">
          <img src="assets/images/icons/2.png" alt="" />
        </span>
        Aprendizado
      </a>
    </li>
    <li>
      <a routerLink="/kanban" routerLinkActive="active">
        <span class="nav-icon nav-icon-img">
          <img src="assets/images/icons/3.png" alt="" />
        </span>
        Projetos Kanban
      </a>
    </li>
  </ul>

  <div class="spacer"></div>

  <a routerLink="/profile" routerLinkActive="active" class="profile-link">
    <span class="profile-avatar">
      <img [src]="profilePhoto" alt="" />
    </span>
    Perfil
  </a>

  <div class="stats">
    <div class="stat-item">
      <span class="stat-emoji">🔥</span>
      <span class="stat-text"><strong>{{ streak }}</strong> {{ streak === 1 ? 'dia seguido' : 'dias seguidos' }}</span>
    </div>
  </div>

  <div class="logout-container">
    <a routerLink="/preferences" routerLinkActive="active" class="settings-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      Configurações
    </a>
    <button (click)="authService.logout()" class="logout-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Sair
    </button>
  </div>
</nav>
